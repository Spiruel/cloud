# Map needed for WebSocket upgrade passthrough
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    # Resolve upstreams at request time via Docker's embedded DNS so nginx
    # starts even when the traccar container is down (it would otherwise
    # crash-loop on "host not found in upstream").
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $traccar_upstream http://traccar:8082;
    set $hologram_upstream https://dashboard.hologram.io;

    # Web app — served at /cat/ to match production path and manifest scope
    location /cat/ {
        alias /usr/share/nginx/html/;
        index index.html;
    }

    # Traccar WebSocket — must be before the /api/ block
    location /api/socket {
        proxy_pass $traccar_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Traccar REST API
    location /api/ {
        proxy_pass $traccar_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Hologram API — required for the Sound / Lost-mode buttons.
    # The browser's Authorization header (built from config.js hologramApiKey)
    # is forwarded as-is. To keep the key off the client entirely, set it here
    # instead:  proxy_set_header Authorization "Basic <base64 of apikey:KEY>";
    location /hologram/ {
        rewrite ^/hologram/(.*)$ /api/1/$1 break;
        proxy_pass $hologram_upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host dashboard.hologram.io;
    }

}
