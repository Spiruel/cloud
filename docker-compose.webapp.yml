version: '3.8'
services:
  webapp:
    image: nginx:alpine
    container_name: webapp
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./web-app:/usr/share/nginx/html:ro
      - ./web-app/nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - emqx-bridge

networks:
  emqx-bridge:
    external: true
    name: cloud_emqx-bridge
